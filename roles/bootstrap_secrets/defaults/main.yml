---
bootstrap_secrets_target_user: "{{ lookup('env', 'SUDO_USER') | default(lookup('env', 'USER'), true) }}"
bootstrap_secrets_target_home: "{{ '/root' if bootstrap_secrets_target_user == 'root' else '/home/' ~ bootstrap_secrets_target_user }}"
bootstrap_secrets_bw_session: "{{ lookup('env', 'BW_SESSION') | default('', true) }}"

bootstrap_secrets_items:
  - name: github_ssh_private_key
    bw_item_id: ""
    dest: "{{ bootstrap_secrets_target_home }}/.ssh/id_ed25519"
    mode: "0600"
  - name: chezmoi_age_private_key
    bw_item_id: ""
    dest: "{{ bootstrap_secrets_target_home }}/.config/chezmoi/age/key.txt"
    mode: "0600"

bootstrap_secrets_create_ssh_public_key: true
